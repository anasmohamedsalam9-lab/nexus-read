name: Nile Manhwa Auto Scraper

on:
  schedule:
    # يعمل كل 6 ساعات للبحث عن الفصول الجديدة
    - cron: '0 */6 * * *'
  workflow_dispatch: # زر التشغيل اليدوي من موقع جيت هاب

permissions:
  contents: write

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 cloudscraper python-dotenv
        # Add any other requirements here if needed

    - name: Run Cloud Runner Bot
      run: |
        python bot/cloud_runner.py

    - name: Commit and Push changes
      run: |
        git config --global user.name 'Nile-Bot'
        git config --global user.email 'nile-bot@users.noreply.github.com'
        git add data.js bot/tracked_mangas.json
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Auto-update: New chapters & manhwas added" && git push)
