<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصفح المانهوا | Nexus Scans</title>
    <!-- Meta tags for SEO -->
    <meta name="description" content="تصفح وابحث عن أفضل قصص المانهوا، المانجا، والمانهوا الكورية المترجمة بجودة عالية وتحديثات مستمرة.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="apple-touch-icon" href="images/nexus-logo.png"></head>
<body class="dark-theme"><div id="nexus-preloader" class="preloader"><div class="preloader-content"><i class="fas fa-meteor preloader-icon"></i><div class="preloader-text">NEXUS</div><div class="preloader-bar"><div class="preloader-progress"></div></div></div></div>

    <!-- Top Horizontal Navbar (Premium Asura Style) -->
    <nav class="asura-nav sticky-header" id="stickyHeader">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="glitch-logo">
                    <span class="glitch-text">NEXUS</span>
                    <i class="fas fa-meteor glitch-icon"></i>
                    <span class="glitch-text">SCANS</span>
                </a>
                <div class="nav-links" id="navLinks">
                    <a href="index.html">الرئيسية</a>
                    <a href="browse.html" class="active">تصفح</a>
                    <a href="browse.html?type=manhwa">المنهوا</a>
                    <a href="browse.html?type=manga">المانجا</a>
                    <a href="browse.html?genre=romance">رومانسي</a>
                </div>
            </div>
            <div class="nav-actions">
                <div class="nav-search-bar">
                    <input type="text" id="searchInput" placeholder="ابحث عن مانهوا...">
                    <button><i class="fas fa-search"></i></button>
                </div>
                <button class="mobile-menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <!-- Mobile Search Overlay -->
    <div class="search-overlay" id="searchOverlay">
        <button class="close-search" id="closeSearch"><i class="fas fa-times"></i></button>
        <div class="search-container">
            <input type="text" id="mobileSearchInput" placeholder="اكتب للبحث...">
            <button class="btn btn-primary" onclick="executeMobileSearch()"><i class="fas fa-search"></i> بحث</button>
        </div>
    </div>

    <!-- Main Browse Content -->
    <main class="asura-home" style="margin-top: 30px;">
        <div class="container">
            <div class="section-header" style="justify-content: center; text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 2.5rem; color: #fff; text-shadow: 0 0 20px rgba(0, 255, 159, 0.3); font-family: var(--font-ar);"><i class="fas fa-compass text-accent"></i> تصفح الأعمال</h1>
            </div>

            <!-- Filters Area -->
            <div style="background: var(--bg-surface-elevated); border: 1px solid var(--border-subtle); padding: 20px; border-radius: 12px; margin-bottom: 30px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center;">
                <div style="flex: 1; min-width: 200px;">
                    <label style="color: #aaa; font-size: 0.8rem; margin-bottom: 5px; display: block;">النوع</label>
                    <select id="filterType" style="width: 100%; background: #000; color: #fff; padding: 10px; border: 1px solid #333; border-radius: 6px;">
                        <option value="all">الكل</option>
                        <option value="manhwa">مانهوا (Manhwa)</option>
                        <option value="manga">مانجا (Manga)</option>
                    </select>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label style="color: #aaa; font-size: 0.8rem; margin-bottom: 5px; display: block;">التصنيف</label>
                    <select id="filterGenre" style="width: 100%; background: #000; color: #fff; padding: 10px; border: 1px solid #333; border-radius: 6px;">
                        <option value="all">الكل</option>
                        <option value="action">أكشن</option>
                        <option value="fantasy">فانتازيا</option>
                        <option value="romance">رومانسي</option>
                        <option value="martial arts">فنون قتالية</option>
                        <option value="isekai">إيسيكاي</option>
                        <option value="system">نظام</option>
                    </select>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label style="color: #aaa; font-size: 0.8rem; margin-bottom: 5px; display: block;">الترتيب</label>
                    <select id="filterSort" style="width: 100%; background: #000; color: #fff; padding: 10px; border: 1px solid #333; border-radius: 6px;">
                        <option value="latest">الأحدث (حسب الفصول)</option>
                        <option value="rating">الأعلى تقييماً</option>
                        <option value="az">أبجدياً (A-Z)</option>
                    </select>
                </div>
                <div style="flex: 0 0 auto; display: flex; align-items: flex-end;">
                    <button onclick="applyFilters()" class="btn btn-primary" style="padding: 10px 20px; border-radius: 6px;"><i class="fas fa-filter"></i> تطبيق الفلاتر</button>
                </div>
            </div>

            <!-- Results Count -->
            <div style="margin-bottom: 20px; color: #aaa; font-size: 0.9rem;">
                تم العثور على <span id="resultsCount" style="color: var(--accent-nile); font-weight: bold;">0</span> عمل.
            </div>

            <!-- Results Grid (Using Latest Chapters Cards) -->
            <div class="latest-list" id="browseGrid" style="grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));">
                <!-- Data injected here -->
            </div>
            
            <!-- Load More (Pagination Mock) -->
            <div style="text-align: center; margin-top: 40px; margin-bottom: 60px;">
                <button id="loadMoreBtn" class="btn btn-secondary" style="display: none; padding: 12px 40px; border-radius: 8px; font-size: 1.1rem;"><i class="fas fa-chevron-down"></i> عرض المزيد</button>
            </div>
        </div>
    </main>

    <!-- Essential Scripts -->
    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        // Browse Logic
        let browseData = [];
        let currentPage = 1;
        const ITEMS_PER_PAGE = 20;

        function initBrowse() {
            if (typeof DB === 'undefined') {
                console.error("No Database Found");
                return;
            }
            
            // Check URL parameters for initial filters
            const params = new URLSearchParams(window.location.search);
            const searchQ = params.get('search');
            const typeQ = params.get('type');
            const genreQ = params.get('genre');

            if (searchQ) document.getElementById('searchInput').value = searchQ;
            if (typeQ) document.getElementById('filterType').value = typeQ;
            if (genreQ) document.getElementById('filterGenre').value = genreQ;

            applyFilters();

            // Setup Load More
            document.getElementById('loadMoreBtn').addEventListener('click', () => {
                currentPage++;
                renderBrowseGrid(false);
            });
            
            // Search Input Event
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') applyFilters();
            });
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const type = document.getElementById('filterType').value;
            const genre = document.getElementById('filterGenre').value.toLowerCase();
            const sort = document.getElementById('filterSort').value;

            // Filter DB
            browseData = DB.filter(item => {
                const matchQuery = !query || (item.title && item.title.toLowerCase().includes(query)) || (item.desc && item.desc.toLowerCase().includes(query));
                const matchType = type === 'all' || (item.type || 'manhwa').toLowerCase() === type;
                const itemGenres = (Array.isArray(item.genres) ? item.genres : (item.genres || '').split(',')).map(g => g.trim().toLowerCase());
                const matchGenre = genre === 'all' || itemGenres.some(g => g.includes(genre));

                return matchQuery && matchType && matchGenre;
            });

            // Sort
            if (sort === 'latest') {
                browseData.sort((a, b) => {
                    const aCh = a.chapters && a.chapters.length > 0 ? a.chapters.length : 0;
                    const bCh = b.chapters && b.chapters.length > 0 ? b.chapters.length : 0;
                    return bCh - aCh;
                });
            } else if (sort === 'rating') {
                browseData.sort((a, b) => (parseFloat(b.rating) || 0) - (parseFloat(a.rating) || 0));
            } else if (sort === 'az') {
                browseData.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
            }

            document.getElementById('resultsCount').textContent = browseData.length;
            currentPage = 1;
            renderBrowseGrid(true);
        }

        function renderBrowseGrid(clear) {
            const grid = document.getElementById('browseGrid');
            if (clear) grid.innerHTML = '';

            if (browseData.length === 0 && clear) {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 50px 20px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px dashed #333;">
                        <i class="fas fa-ghost" style="font-size: 3rem; color: #444; margin-bottom: 15px;"></i>
                        <h3 style="color: #ccc;">لم يتم العثور على أي نتائج مطابقة لبحثك.</h3>
                    </div>`;
                document.getElementById('loadMoreBtn').style.display = 'none';
                return;
            }

            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const toRender = browseData.slice(start, end);

            const html = toRender.map(item => {
                const ch = (item.chapters || []).sort((a,b) => parseFloat(b.n) - parseFloat(a.n)).slice(0, 3);
                const chHTML = ch.map((c, i) => {
                    const isNew = i === 0;
                    const dateLabel = timeAgo(c.d);
                    return \`
                        <div class="lc-ch-row" onclick="event.stopPropagation(); window.openReader('\${item.title.replace(/'/g, "\\\\'")}', '\${c.n}')">
                            \${isNew ? '<i class="fas fa-lock-open lc-ch-icon lc-new"></i>' : '<i class="fas fa-eye lc-ch-icon"></i>'}
                            <span class="lc-ch-name">Chapter \${c.n}</span>
                            <span class="lc-ch-date">\${isNew ? '<span class="lc-new-badge">New</span>' : dateLabel}</span>
                        </div>
                    \`;
                }).join('');

                const cover = item.cover || item.img || 'images/default-cover.jpg';
                const typeBadge = (item.type || 'manhwa').toLowerCase() === 'manga' ? 'Manga' : 'Manhwa';

                return \`
                    <div class="latest-card-v2" onclick="goToSeries('\${item.title.replace(/'/g, "\\\\'")}', 'manhwa')">
                        <div class="lc-cover">
                            <img src="\${cover}" alt="\${item.title}" loading="lazy">
                            <span class="lc-type-badge">\${typeBadge}</span>
                        </div>
                        <div class="lc-info">
                            <h3 class="lc-title">\${item.title}</h3>
                            <div class="lc-meta">
                                <span class="lc-rating">\${item.rating || '9.5'} <i class="fas fa-star"></i></span>
                                <span class="lc-status"><i class="fas fa-circle"></i> Ongoing</span>
                            </div>
                            <div class="lc-chapters">
                                \${chHTML}
                            </div>
                        </div>
                    </div>
                \`;
            }).join('');

            grid.insertAdjacentHTML('beforeend', html);

            if (end >= browseData.length) {
                document.getElementById('loadMoreBtn').style.display = 'none';
            } else {
                document.getElementById('loadMoreBtn').style.display = 'inline-block';
            }
        }

        document.addEventListener('DOMContentLoaded', initBrowse);
    </script>

    <!-- Custom Cursor -->
    <div class="custom-cursor" id="customCursor"></div>

</body>
</html>
