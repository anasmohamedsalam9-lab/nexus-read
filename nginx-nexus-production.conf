# =========================================================================
# Production Nginx Configuration for Nexus Manga/Manhwa Platform
# Features: Origin Shielding, Secure Ad Reward API, Anti-Scraping Bot Controls
# =========================================================================

user nginx;
worker_processes auto;
pid /run/nginx.pid;

# Maximum number of open files per worker process
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging optimizations
    log_format custom_shield '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent" '
                             'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time"';

    access_log /var/log/nginx/nexus_access.log custom_shield;
    error_log /var/log/nginx/nexus_error.log warn;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Hide Nginx version

    # File descriptors cache
    open_file_cache max=50000 inactive=60s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # SSL global settings (Modern / Strict Configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Enable HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: android-webview-video-poster:; media-src 'self' https: data:;" always;

    # =========================================================================
    # RATE LIMITING ZONES
    # =========================================================================
    
    # 1. API Rate Limiting: Steady state of 2 requests/sec per IP, allowing bursts
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;

    # 2. Asset/Manga Chapters Rate Limiting: Allow steady 6r/s (30 images in 5s burst)
    limit_req_zone $binary_remote_addr zone=manga_asset_limit:10m rate=6r/s;

    # =========================================================================
    # AUTOMATED USER-AGENT BLOCKLIST (Anti-Scraping / MangaLek Bots)
    # =========================================================================
    map $http_user_agent $bad_bot {
        default 0;
        ~*(scrapy|requests|urllib|python|beautifulsoup|mechanize) 1;
        ~*(axios|needle|superagent|got|node-fetch) 1;
        ~*(selenium|webdriver|puppeteer|playwright|headlesschrome) 1;
        ~*(curl|wget|aria2|httpie) 1;
        ~*(mj12bot|semrushbot|ahrefsbot|dotbot|rogerbot|exabot) 1;
        ~*(scooter|cyberalert|flaming|google-search-local) 0; # Whitelist search
    }

    # =========================================================================
    # UPSTREAM APPLICATION SERVERS
    # =========================================================================
    upstream nexus_backend_upstream {
        server 127.0.0.1:8080 max_fails=3 fail_timeout=10s;
        keepalive 32; # Keepalive HTTP connections to backend for speed
    }

    # =========================================================================
    # SERVER PORT 80 - HTTPS FORCED REDIRECT
    # =========================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # =========================================================================
    # SERVER PORT 443 - COMPREHENSIVE PRODUCTION EDGE SHIELD
    # =========================================================================
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name nexus-manga.com *.nexus-manga.com;

        # SSL Certificates
        ssl_certificate /etc/letsencrypt/live/nexus-manga.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nexus-manga.com/privkey.pem;

        # Root static website location
        root /var/www/nexus;
        index index.html;

        # ---------------------------------------------------------------------
        # BOT ATTACK FILTERING
        # ---------------------------------------------------------------------
        if ($bad_bot = 1) {
            return 403 "Blocked: Automated access is forbidden on Nexus platform.";
        }

        # ---------------------------------------------------------------------
        # MAIN STATIC CONTENT
        # ---------------------------------------------------------------------
        location / {
            try_files $uri $uri/ =404;
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        # ---------------------------------------------------------------------
        # API SECURE ROUTING (Rate Limited)
        # ---------------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            
            proxy_pass https://nexus_backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Forward headers correctly to shield origin server IP
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Anti-abuse buffers
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ---------------------------------------------------------------------
        # REWARDED AD CALLBACK COIN API - SECURE S2S Postbacks (No Cache)
        # ---------------------------------------------------------------------
        location /api/v1/rewards/credit-coins {
            limit_req zone=api_limit burst=5 nodelay;
            
            proxy_pass https://nexus_backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Strict header forwarding for IP checks on Adsterra callback
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Strictly bypass and prevent caching on ad callbacks
            proxy_cache_bypass $http_upgrade;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            
            # Secure buffers
            client_max_body_size 10k;
            client_body_buffer_size 10k;
        }

        # ---------------------------------------------------------------------
        # MANGA CHAPTERS ASSETS PROTECTION (Hotlinking & High-Rate Scrapers)
        # ---------------------------------------------------------------------
        location ~* ^/(images/chapters/|assets/manga/).*\.(jpe?g|gif|png|webp)$ {
            # 1. Enforce Chapter/Image rate limiting (Max 30 requests in 5 seconds per IP)
            limit_req zone=manga_asset_limit burst=30 nodelay;

            # 2. Hotlinking prevention via referer validation
            valid_referers none blocked server_names nexus-manga.com *.nexus-manga.com;
            if ($invalid_referer) {
                return 403;
            }

            # 3. High performance long caching on proxy edge
            expires 30d;
            add_header Cache-Control "public, no-transform, immutable";
            add_header Access-Control-Allow-Origin "https://nexus-manga.com";
            
            # Serve directly from static disc without hitting backend database
            try_files $uri =404;
        }

        # ---------------------------------------------------------------------
        # STRICT CONFIGURATION PROTECTION
        # ---------------------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
